<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Edilcrema — Gestionale Acquisti</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding-bottom:90px}
.header{background:#2196c4;padding:12px 20px;display:flex;align-items:center;gap:12px}
.header img{height:44px;width:44px;border-radius:8px;object-fit:cover}
.header-text{display:flex;flex-direction:column}
.header-title{color:#fff;font-size:17px;font-weight:600;line-height:1.2}
.header-sub{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}
.app{max-width:700px;margin:0 auto;padding:1rem}
.tab-bar{display:flex;gap:8px;margin-bottom:1.25rem}
.tab{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#666;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:#2196c4;color:#fff;border-color:#2196c4;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.section-label{font-size:13px;font-weight:500;color:#2196c4;border-bottom:.5px solid #e8e8e8;padding-bottom:10px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
label{font-size:13px;color:#666;display:block;margin-bottom:6px;margin-top:14px}
label:first-child{margin-top:0}
select,input[type=date],input[type=number],input[type=text],textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
select:focus,input:focus,textarea:focus{outline:none;border-color:#2196c4}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Tabella righe ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#888;padding:8px 5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:.5px solid #e8e8e8}
td{padding:4px 5px;vertical-align:middle}
td input,td select{padding:8px 10px;font-size:14px}
.btn-remove{color:#ccc;cursor:pointer;transition:color .15s;background:none;border:none;font-size:15px;padding:4px 6px}
.btn-remove:hover{color:#e24b4a}
.btn-add{background:#fff;color:#2196c4;border:1.5px dashed #2196c4;padding:11px;border-radius:8px;width:100%;cursor:pointer;font-weight:500;font-size:14px;margin-top:10px;font-family:inherit;transition:background .15s}
.btn-add:hover{background:#f0f8fd}

/* ── Footer fisso ── */
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;z-index:200}
.footer-total-label{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:2px}
.footer-total-value{font-size:22px;font-weight:600;color:#2196c4}
.btn-submit{background:#2196c4;color:#fff;border:none;border-radius:8px;padding:13px 24px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-submit:active{opacity:.8}
.btn-submit:disabled{opacity:.5}

/* ── Dashboard ── */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600}
.metric-sub{font-size:12px;color:#aaa;margin-top:4px}
.bar-item{margin-bottom:12px}
.bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.bar-val{color:#666;font-size:12px}
.bar-track{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:#2196c4;transition:width .6s ease}
.dash-section-title{font-size:15px;font-weight:500;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.refresh-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#888;font-family:inherit}
.refresh-btn:hover{color:#2196c4}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:14px}

/* ── Feedback ── */
.error-msg{background:#fff5f5;border:1px solid #fcc;border-radius:8px;padding:10px 14px;font-size:13px;color:#c00;margin-bottom:12px;display:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* ── Loading overlay ── */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;color:#fff;font-size:14px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top:3px solid #fff;border-radius:50%;animation:spin .9s linear infinite;margin-bottom:12px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

@media(prefers-color-scheme:dark){
  body{background:#111;color:#eee}
  .header{background:#1778a0}
  .card,.metric{background:#1e1e1e;border-color:#333}
  .tab{background:#1e1e1e;border-color:#333;color:#aaa}
  .tab.active{background:#2196c4;color:#fff;border-color:#2196c4}
  select,input,textarea{background:#1e1e1e;color:#eee;border-color:#333}
  select:focus,input:focus{border-color:#2196c4}
  .bar-track{background:#333}
  .footer-bar{background:#1e1e1e;border-color:#333}
  .error-msg{background:#2a0000;border-color:#800;color:#f88}
  th{color:#666}
  .btn-remove{color:#555}
}
@media(max-width:500px){
  .row3{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  th:nth-child(4),td:nth-child(4){display:none} /* nascondi col Note su mobile */
}
</style>
</head>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFhCpTMnUJ1gLpV2GSSCIJVCtznzPy1bL1fRTe1tLGOxF1D7jhlV45KBAC-XN-nJM/exec";

// ── Utility ──────────────────────────────────────────────
function fmt(n){
  return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showError(msg){
  const e=document.getElementById('error-msg');
  e.textContent=msg;e.style.display='block';
  setTimeout(()=>e.style.display='none',4000);
}
async function fetchJson(params){
  const res=await fetch(SCRIPT_URL+'?'+new URLSearchParams(params));
  return res.json();
}

// ── Init ─────────────────────────────────────────────────
window.onload = async () => {
  document.getElementById('data_ordine').value = new Date().toISOString().split('T')[0];
  try {
    const [fornitori, cantieri] = await Promise.all([
      fetchJson({tipo:'fornitori'}),
      fetchJson({tipo:'cantieri'})
    ]);
    document.getElementById('lista_fornitori').innerHTML =
      fornitori.map(f=>`<option value="${f}">`).join('');
    document.getElementById('cantiere').innerHTML =
      '<option value="">— seleziona —</option>' +
      cantieri.map(c=>`<option value="${c}">${c}</option>`).join('');
    addRow();
    document.getElementById('loader').style.display = 'none';
  } catch(e) {
    document.getElementById('loader').innerHTML = '<p style="color:#faa;padding:20px">Errore caricamento dati. Ricarica la pagina.</p>';
  }
};

// ── Gestione righe ────────────────────────────────────────
function addRow(){
  const id = Date.now();
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  tr.innerHTML = `
    <td><input type="text" class="m-mat" placeholder="es. Ferro, Cls..." required></td>
    <td><input type="number" class="m-qty" step="0.01" value="1" oninput="calcTotale()" style="min-width:60px"></td>
    <td>
      <select class="m-unit">
        <option>kg</option><option>mc</option><option>mq</option>
        <option>pz</option><option>ore</option><option>t</option><option>ml</option>
      </select>
    </td>
    <td><input type="number" class="m-price" step="0.001" placeholder="0.00" oninput="calcTotale()" style="min-width:80px"></td>
    <td><input type="text" class="m-note" placeholder="DDT, note..."></td>
    <td><button type="button" class="btn-remove" onclick="removeRow('${id}')"><i class="fas fa-trash"></i></button></td>
  `;
  document.getElementById('tableBody').appendChild(tr);
  // focus automatico sul campo materiale della nuova riga
  tr.querySelector('.m-mat').focus();
}

function removeRow(id){
  const row = document.getElementById(`row-${id}`);
  if(row) { row.remove(); calcTotale(); }
}

function calcTotale(){
  let total = 0;
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    const qty   = parseFloat(tr.querySelector('.m-qty')?.value)   || 0;
    const price = parseFloat(tr.querySelector('.m-price')?.value) || 0;
    total += qty * price;
  });
  document.getElementById('grand-total').textContent = fmt(total);
}

// ── Salvataggio ───────────────────────────────────────────
async function salvaOrdine(){
  const data_ordine = document.getElementById('data_ordine').value;
  const fornitore   = document.getElementById('fornitore').value.trim();
  const cantiere    = document.getElementById('cantiere').value;
  const stato       = document.getElementById('stato').value;

  if(!data_ordine){ showError('Inserisci la data ordine'); return; }
  if(!fornitore)  { showError('Inserisci il fornitore'); return; }
  if(!cantiere)   { showError('Seleziona il cantiere'); return; }

  const rows = document.querySelectorAll('#tableBody tr');
  if(!rows.length){ showError('Aggiungi almeno una voce d\'ordine'); return; }

  // Valida tutte le righe prima di inviare
  for(let tr of rows){
    const mat   = tr.querySelector('.m-mat').value.trim();
    const qty   = parseFloat(tr.querySelector('.m-qty').value);
    const price = parseFloat(tr.querySelector('.m-price').value);
    if(!mat)           { showError('Inserisci il materiale in ogni riga'); return; }
    if(!qty || qty<=0) { showError('Controlla le quantità'); return; }
    if(!price||price<=0){ showError('Controlla i prezzi unitari'); return; }
  }

  const btn = document.getElementById('btn-salva');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Invio...';

  try {
    for(let tr of rows){
      const qty   = parseFloat(tr.querySelector('.m-qty').value);
      const price = parseFloat(tr.querySelector('.m-price').value);
      const payload = {
        tipo:           'salva',
        data_ordine,
        fornitore,
        cantiere,
        stato,
        materiale:      tr.querySelector('.m-mat').value.trim(),
        quantita:       qty,
        unita:          tr.querySelector('.m-unit').value,
        prezzo_unitario: price,
        totale:         (qty * price).toFixed(2),
        note:           tr.querySelector('.m-note').value.trim()
      };
      await fetchJson(payload);
    }
    showToast(`✓ ${rows.length} voce/i registrate`);
    // Reset form
    document.getElementById('fornitore').value = '';
    document.getElementById('cantiere').value  = '';
    document.getElementById('stato').value     = 'Inviato';
    document.getElementById('data_ordine').value = new Date().toISOString().split('T')[0];
    document.getElementById('tableBody').innerHTML = '';
    calcTotale();
    addRow();
  } catch(err) {
    showError('Errore durante il salvataggio. Riprova.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check" style="margin-right:8px"></i>Registra ordine';
  }
}

// ── Dashboard ─────────────────────────────────────────────
async function caricaDashboard(){
  document.getElementById('dash-loading').style.display  = 'block';
  document.getElementById('dash-content').style.display  = 'none';
  try {
    const ordini = await fetchJson({tipo:'ordini'});
    if(!ordini.length){
      document.getElementById('dash-loading').textContent = 'Nessun ordine ancora.';
      return;
    }
    const oggi    = new Date();
    const meseCor = oggi.getFullYear()+'-'+String(oggi.getMonth()+1).padStart(2,'0');
    const ordiniMese    = ordini.filter(o=>String(o.data_ordine).startsWith(meseCor));
    const totaleMese    = ordiniMese.reduce((s,o)=>s+(parseFloat(o.totale)||0),0);
    const totaleGenerale= ordini.reduce((s,o)=>s+(parseFloat(o.totale)||0),0);

    document.getElementById('spesa-mese').textContent    = fmt(totaleMese);
    document.getElementById('spesa-mese-sub').textContent= ordiniMese.length+' ordini questo mese';
    document.getElementById('tot-ordini').textContent    = fmt(totaleGenerale);
    document.getElementById('tot-ordini-sub').textContent= ordini.length+' ordini totali';

    const byCantiere={}, byFornitore={};
    ordini.forEach(o=>{
      const kc=o.cantiere||'N/D';  byCantiere[kc] =(byCantiere[kc] ||0)+(parseFloat(o.totale)||0);
      const kf=o.fornitore||'N/D'; byFornitore[kf]=(byFornitore[kf]||0)+(parseFloat(o.totale)||0);
    });
    renderBars('bar-cantieri', byCantiere);
    renderBars('bar-fornitori',byFornitore);

    document.getElementById('dash-loading').style.display = 'none';
    document.getElementById('dash-content').style.display = 'block';
  } catch(e) {
    document.getElementById('dash-loading').textContent = 'Errore nel caricamento. Riprova.';
  }
}

function renderBars(elId, data){
  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max    = sorted[0]?.[1] || 1;
  document.getElementById(elId).innerHTML = sorted.map(([nome,val])=>`
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">${nome}</span>
        <span class="bar-val">${fmt(val)}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(val/max*100)}%"></div>
      </div>
    </div>`
  ).join('');
}

// ── Tab switch ────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active', ['ordine','dashboard'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='dashboard') caricaDashboard();
}
</script>
