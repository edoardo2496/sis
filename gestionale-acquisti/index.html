<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Edilcrema — Gestionale Acquisti</title>
<style>
/* STILI ORIGINALI RIPRISTINATI */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#2196c4;padding:12px 20px;display:flex;align-items:center;gap:12px}
.header img{height:44px;width:44px;border-radius:8px;object-fit:cover}
.header-text{display:flex;flex-direction:column}
.header-title{color:#fff;font-size:17px;font-weight:600;line-height:1.2}
.header-sub{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}

/* STILI APP E TAB */
.app{max-width:520px;margin:0 auto;padding:1rem}
.tab-bar{display:flex;gap:8px;margin-bottom:1.5rem}
.tab{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#666;cursor:pointer;font-family:inherit}
.tab.active{background:#2196c4;color:#fff;border-color:#2196c4;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
label{font-size:13px;color:#666;display:block;margin-bottom:6px;margin-top:14px}
label:first-child{margin-top:0}
select,input,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;font-family:inherit}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* NUOVI STILI PER RIGHE MULTIPLE (DISCRETI) */
.item-row{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:12px;margin-bottom:12px;position:relative; border-left: 4px solid #2196c4;}
.btn-remove{position:absolute;top:8px;right:8px;background:#ff4444;color:white;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px}
.btn-add{background:none;color:#2196c4;border:1px dashed #2196c4;width:100%;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:15px;font-weight:600;font-size:14px}
.total-box{background:#e3f2fd;border:1px solid #2196c4;text-align:right;padding:12px;border-radius:8px;margin-bottom:20px}
.total-box span{font-weight:700;color:#2196c4;font-size:18px}
.btn-primary{background:#2196c4;color:#fff;border:none;width:100%;padding:15px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:0.3s;z-index:999}
.toast.show{opacity:1}

@media(prefers-color-scheme:dark){
    body{background:#111;color:#eee}
    .card,.item-row{background:#1e1e1e;border-color:#333}
    select,input,textarea{background:#222;color:#eee;border-color:#444}
    .total-box{background:#172a3a}
}
</style>
</head>

<div class="app">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('ordine')">Nuovo ordine</button>
    <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
  </div>

  <div id="tab-ordine" class="section active">
    <div class="card">
      <label>Data ordine</label>
      <input type="date" id="data_ordine">
      
      <label>Fornitore</label>
      <input type="text" id="fornitore" list="lista_fornitori" placeholder="Cerca fornitore...">
      <datalist id="lista_fornitori"></datalist>
      
      <label>Cantiere</label>
      <select id="cantiere"><option value="">— seleziona —</option></select>
      
      <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
      <div style="font-weight:600; margin-bottom:12px; font-size:14px; color:#2196c4; text-transform: uppercase; letter-spacing: 0.5px;">Articoli</div>
      
      <div id="items-list">
          </div>
      
      <button class="btn-add" onclick="aggiungiRiga()">+ Aggiungi materiale</button>

      <div class="total-box">
        TOTALE DOCUMENTO: <span id="gran_totale">€ 0,00</span>
      </div>

      <label>Stato ordine</label>
      <select id="stato">
        <option>Inviato</option>
        <option>Confermato</option>
        <option>Ricevuto</option>
        <option>Fatturato</option>
        <option>Preventivo</option>
      </select>
      
      <label>Note</label>
      <textarea id="note" rows="2" placeholder="Note facoltative..."></textarea>
      
      <button class="btn-primary" onclick="salvaTutto()" id="btn-salva">Salva ordine</button>
    </div>
  </div>

  <div id="tab-dashboard" class="section">
    <div id="dash-loading" style="text-align:center;padding:2rem;color:#aaa">Caricamento...</div>
    <div id="dash-content" style="display:none">
        <div class="card">
            <div style="font-size:12px;color:#888">Totale ordini caricati</div>
            <div style="font-size:24px;font-weight:700" id="tot-ordini">€ 0</div>
        </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFhCpTMnUJ1gLpV2GSSCIJVCtznzPy1bL1fRTe1tLGOxF1D7jhlV45KBAC-XN-nJM/exec";
let rigaCounter = 0;

function fmt(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n);}

function aggiungiRiga() {
    const container = document.getElementById('items-list');
    const id = rigaCounter++;
    const html = `
        <div class="item-row" id="row-${id}">
            <button class="btn-remove" onclick="rimuoviRiga(${id})">×</button>
            <label>Materiale</label>
            <input type="text" class="i-mat" placeholder="es. Ferro, Calcestruzzo...">
            <div class="row">
                <div>
                    <label>Quantità</label>
                    <input type="number" class="i-qta" oninput="calc()" placeholder="0">
                </div>
                <div>
                    <label>Unità</label>
                    <select class="i-uni">
                        <option>kg</option><option>mc</option><option>mq</option><option>pz</option><option>t</option><option>ml</option>
                    </select>
                </div>
            </div>
            <label>Prezzo unitario (€)</label>
            <input type="number" class="i-pre" oninput="calc()" placeholder="0.00" step="0.01">
        </div>`;
    container.insertAdjacentHTML('beforeend', html);
}

function rimuoviRiga(id) {
    const rows = document.querySelectorAll('.item-row');
    if(rows.length > 1) {
        document.getElementById(`row-${id}`).remove();
        calc();
    }
}

function calc() {
    let tot = 0;
    document.querySelectorAll('.item-row').forEach(r => {
        const q = parseFloat(r.querySelector('.i-qta').value) || 0;
        const p = parseFloat(r.querySelector('.i-pre').value) || 0;
        tot += (q * p);
    });
    document.getElementById('gran_totale').textContent = fmt(tot);
}

async function salvaTutto() {
    const btn = document.getElementById('btn-salva');
    const articoli = [];
    
    document.querySelectorAll('.item-row').forEach(r => {
        const mat = r.querySelector('.i-mat').value.trim();
        const qta = r.querySelector('.i-qta').value;
        const pre = r.querySelector('.i-pre').value;
        if(mat && qta) {
            articoli.push({
                materiale: mat,
                quantita: qta,
                unita: r.querySelector('.i-uni').value,
                prezzo: pre
            });
        }
    });

    const params = {
        tipo: 'salva',
        data_ordine: document.getElementById('data_ordine').value,
        fornitore: document.getElementById('fornitore').value,
        cantiere: document.getElementById('cantiere').value,
        stato: document.getElementById('stato').value,
        note: document.getElementById('note').value,
        articoli: JSON.stringify(articoli)
    };

    if(!params.data_ordine || !params.fornitore || articoli.length === 0) {
        alert("Compila i dati principali e almeno un articolo!");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Salvataggio...";

    try {
        await fetch(SCRIPT_URL + '?' + new URLSearchParams(params), { mode: 'no-cors' });
        document.getElementById('toast').textContent = "Ordine salvato!";
        document.getElementById('toast').classList.add('show');
        setTimeout(() => location.reload(), 1500);
    } catch(e) {
        alert("Errore!");
        btn.disabled = false;
    }
}

async function init() {
    document.getElementById('data_ordine').value = new Date().toISOString().split('T')[0];
    aggiungiRiga();
    
    try {
        const resF = await fetch(SCRIPT_URL + "?tipo=fornitori");
        const fornitori = await resF.json();
        document.getElementById('lista_fornitori').innerHTML = fornitori.map(f => `<option value="${f}">`).join('');
        
        const resC = await fetch(SCRIPT_URL + "?tipo=cantieri");
        const cantieri = await resC.json();
        document.getElementById('cantiere').innerHTML += cantieri.map(c => `<option value="${c}">${c}</option>`).join('');
    } catch(e) {}
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['ordine', 'dashboard'][i] === name));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
}

init();
</script>
</body>
</html>
