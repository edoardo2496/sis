<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edilcrema — RDA</title>
    <style>
        :root {
            --blue: #1a56db; --blue-light: #e8f0fe; --blue-mid: #4a7fd4;
            --green: #0e7c4a; --green-light: #e6f4ed; --red: #c0392b;
            --red-light: #fdecea; --orange: #d35400; --bg: #f0f2f5;
            --white: #ffffff; --text: #1a1f2e; --text-muted: #6b7280;
            --border: #dde2ea; --border-focus: #1a56db; --radius: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding-bottom: 100px; }
        .header { background: var(--white); border-bottom: 2.5px solid var(--blue); padding: 14px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 50; }
        .logo { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo svg { width: 24px; height: 24px; }
        .header-brand { font-size: 15px; font-weight: 800; color: var(--blue); text-transform: uppercase; }
        .rda-badge { background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
        .app { max-width: 640px; margin: 0 auto; padding: 16px; }
        .steps { display: flex; align-items: center; margin-bottom: 20px; padding: 0 4px; }
        .step-item { display: flex; align-items: center; gap: 6px; flex: 1; }
        .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; transition: 0.25s; }
        .step-dot.active { background: var(--blue); color: #fff; box-shadow: 0 0 0 3px #c7d9f8; }
        .step-dot.todo { background: var(--border); color: var(--text-muted); }
        .step-line { flex: 1; height: 2px; background: var(--border); margin: 0 4px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
        .card-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--blue); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .field input, .field select, .field textarea { width: 100%; padding: 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; outline: none; background: white; }
        .field input:focus, .field select:focus { border-color: var(--blue); }
        .mat-item { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; overflow: hidden; }
        .mat-header { display: flex; align-items: center; padding: 10px; background: #fafbfc; border-bottom: 1px solid var(--border); }
        .mat-num { width: 22px; height: 22px; background: var(--blue); color: white; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-right: 10px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; z-index: 50; }
        .btn-next { flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm); background: var(--blue); color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { padding: 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: none; color: var(--text-muted); font-weight: 700; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .loader-init { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

<div class="loader-init" id="initLoader">
    <div class="spinner" style="border-top-color: var(--blue)"></div>
    <span style="margin-top:10px; color: var(--text-muted)">Caricamento database...</span>
</div>

<header class="header">
    <div class="logo"><svg viewBox="0 0 24 24" fill="white"><path d="M3 21L12 5L21 21H3Z" opacity="0.9"/><path d="M7 21V14H17V21" opacity="0.5"/></svg></div>
    <div style="flex:1">
        <div class="header-brand">Edilcrema</div>
        <div style="font-size:11px; color:var(--text-muted)">Richiesta di acquisto</div>
    </div>
    <div class="rda-badge" id="badgeRda">NUOVA RDA</div>
</header>

<div class="app">
    <div class="steps">
        <div class="step-item"><div class="step-dot active" id="dot1">1</div></div>
        <div class="step-line" id="line12"></div>
        <div class="step-item"><div class="step-dot todo" id="dot2">2</div></div>
        <div class="step-line" id="line23"></div>
        <div class="step-item"><div class="step-dot todo" id="dot3">3</div></div>
    </div>

    <div id="step1">
        <div class="card">
            <div class="card-label">Identità e Destinazione</div>
            <div class="field">
                <label>Richiedente *</label>
                <select id="richiedente">
                    <option value="">Seleziona...</option>
                    <option value="Stefano Crema">Stefano Crema</option>
                    <option value="Franco Crema">Franco Crema</option>
                    <option value="Stefano Rossi">Stefano Rossi</option>
                    <option value="Mirco Ceccon">Mirco Ceccon</option>
                </select>
            </div>
            <div class="field">
                <label>Cantiere *</label>
                <select id="cantiere"><option>Caricamento...</option></select>
            </div>
            <div class="field">
                <label>Fornitore (Scrivi per suggerimento)</label>
                <input type="text" id="fornitore" list="listaFornitori" placeholder="Inizia a scrivere il nome...">
                <datalist id="listaFornitori"></datalist>
            </div>
        </div>
        <div class="card">
            <div class="card-label">Logistica</div>
            <div class="field">
                <label>Consegna entro il *</label>
                <input type="date" id="dataConsegna">
            </div>
        </div>
    </div>

    <div id="step2" class="hidden">
        <div class="card">
            <div class="card-label">Materiali</div>
            <div id="matList"></div>
            <button onclick="addMat()" style="width:100%; padding:12px; border:2px dashed var(--blue-mid); border-radius:8px; background:none; color:var(--blue); font-weight:700; margin-top:10px; cursor:pointer;">+ Aggiungi materiale</button>
        </div>
        <div class="card">
            <div class="field">
                <label>Note aggiuntive</label>
                <textarea id="note" rows="3" placeholder="es. Marca specifica, urgenza, note per scarico..."></textarea>
            </div>
        </div>
    </div>

    <div id="step3" class="hidden">
        <div class="card">
            <div class="card-label">Riepilogo e Invio</div>
            <div id="riepilogoBox" style="font-size:14px; line-height:1.6; background:var(--blue-light); padding:15px; border-radius:8px; margin-bottom:15px; border: 1px solid var(--blue-mid);"></div>
            <div class="field">
                <label>Conferma Nome per Firma *</label>
                <input type="text" id="firma" placeholder="Nome e Cognome">
            </div>
        </div>
    </div>

    <div id="successScreen" class="hidden" style="text-align:center; padding:40px 20px;">
        <div style="font-size:60px;">✅</div>
        <h2 style="margin-top:20px">RDA Inviata!</h2>
        <p style="color:var(--text-muted); margin-top:10px;">Il PDF è stato generato e salvato su Drive.</p>
        <p id="successRda" style="color:var(--blue); font-weight:800; font-size:20px; margin-top:15px;"></p>
        <button onclick="location.reload()" class="btn-next" style="margin-top:30px">Nuova Richiesta</button>
    </div>
</div>

<div class="footer" id="footer">
    <button class="btn-back hidden" id="btnBack" onclick="goBack()">Indietro</button>
    <button class="btn-next" id="btnNext" onclick="goNext()">Continua</button>
</div>

<script>
// NOTA: Aggiorna questo URL con quello della tua Web App pubblicata
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFhCpTMnUJ1gLpV2GSSCIJVCtznzPy1bL1fRTe1tLGOxF1D7jhlV45KBAC-XN-nJM/exec";

let currentStep = 1;
let matCount = 0;

async function loadLists() {
    try {
        const [resCant, resForn] = await Promise.all([
            fetch(`${SCRIPT_URL}?tipo=cantieri`),
            fetch(`${SCRIPT_URL}?tipo=fornitori`)
        ]);
        const cantieri = await resCant.json();
        const fornitori = await resForn.json();

        const selC = document.getElementById('cantiere');
        const dlF = document.getElementById('listaFornitori');
        
        selC.innerHTML = '<option value="">Scegli cantiere...</option>';
        cantieri.forEach(c => selC.innerHTML += `<option value="${c}">${c}</option>`);
        
        dlF.innerHTML = '';
        fornitori.forEach(f => dlF.innerHTML += `<option value="${f}">`);

        document.getElementById('initLoader').classList.add('hidden');
    } catch (e) {
        alert("Errore nel caricamento dei dati. Controlla la connessione o l'URL del backend.");
    }
}

function addMat() {
    matCount++;
    const div = document.createElement('div');
    div.className = 'mat-item';
    div.innerHTML = `
        <div class="mat-header"><div class="mat-num">${matCount}</div><input type="text" class="m-desc" placeholder="Cosa serve?" style="border:none; background:none; font-weight:600; flex:1; outline:none"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px;">
            <div><label style="font-size:10px; font-weight:700; color:#999; text-transform:uppercase;">Quantità</label><input type="number" class="m-qty" value="1" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:4px;"></div>
            <div><label style="font-size:10px; font-weight:700; color:#999; text-transform:uppercase;">Unità</label><select class="m-unit" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:4px;"><option>pz</option><option>kg</option><option>m</option><option>m³</option><option>lt</option></select></div>
        </div>`;
    document.getElementById('matList').appendChild(div);
}

function goNext() {
    if (currentStep === 1) {
        if (!document.getElementById('richiedente').value || !document.getElementById('cantiere').value || !document.getElementById('dataConsegna').value) {
            return alert("Tutti i campi contrassegnati con * sono obbligatori!");
        }
        setStep(2);
        if (matCount === 0) addMat();
    } else if (currentStep === 2) {
        const hasMats = Array.from(document.querySelectorAll('.m-desc')).some(i => i.value.trim() !== "");
        if(!hasMats) return alert("Aggiungi almeno un materiale!");
        setStep(3);
        renderRiepilogo();
    } else if (currentStep === 3) {
        inviaDati();
    }
}

function setStep(n) {
    currentStep = n;
    document.getElementById('step1').classList.toggle('hidden', n !== 1);
    document.getElementById('step2').classList.toggle('hidden', n !== 2);
    document.getElementById('step3').classList.toggle('hidden', n !== 3);
    document.getElementById('btnBack').classList.toggle('hidden', n === 1);
    document.getElementById('btnNext').textContent = n === 3 ? "Conferma e Genera PDF" : "Continua";
    document.getElementById('dot2').className = `step-dot ${n >= 2 ? 'active' : 'todo'}`;
    document.getElementById('dot3').className = `step-dot ${n === 3 ? 'active' : 'todo'}`;
}

function renderRiepilogo() {
    const r = document.getElementById('richiedente').value;
    const c = document.getElementById('cantiere').value;
    const f = document.getElementById('fornitore').value || "Da definire";
    const d = document.getElementById('dataConsegna').value;
    const mats = Array.from(document.querySelectorAll('.mat-item')).filter(it => it.querySelector('.m-desc').value.trim() !== "").length;
    
    document.getElementById('riepilogoBox').innerHTML = `
        <strong>Richiedente:</strong> ${r}<br>
        <strong>Cantiere:</strong> ${c}<br>
        <strong>Fornitore:</strong> ${f}<br>
        <strong>Consegna:</strong> ${d}<br>
        <strong>Materiali:</strong> ${mats} voci in lista`;
}

async function inviaDati() {
    const firma = document.getElementById('firma').value.trim();
    if (!firma) return alert("Inserisci il tuo nome per firmare la richiesta!");

    const btn = document.getElementById('btnNext');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Elaborazione...';

    const materiali = Array.from(document.querySelectorAll('.mat-item'))
        .filter(item => item.querySelector('.m-desc').value.trim() !== "")
        .map(item => ({
            descrizione: item.querySelector('.m-desc').value,
            quantita: item.querySelector('.m-qty').value,
            unita: item.querySelector('.m-unit').value
        }));

    const payload = {
        richiedente: document.getElementById('richiedente').value,
        cantiere: document.getElementById('cantiere').value,
        fornitore: document.getElementById('fornitore').value,
        data_consegna: document.getElementById('dataConsegna').value,
        note: document.getElementById('note').value,
        firma: firma,
        materiali: materiali
    };

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if (result.ok) {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('footer').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
            document.getElementById('successRda').textContent = result.rda;
        } else {
            throw new Error(result.error);
        }
    } catch (e) {
        alert("Errore: " + e.message);
        btn.disabled = false;
        btn.textContent = "Riprova";
    }
}

function goBack() { if (currentStep > 1) setStep(currentStep - 1); }

window.onload = loadLists;
</script>
</body>
</html>
