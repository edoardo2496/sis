<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDILCREMA ERP | PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f9; --border: #dbe2e8; --text: #2c3e50; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; }

        /* Header con Logo */
        .header { background: var(--white); padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid var(--primary); }
        .logo-container { width: 40px; height: 40px; }
        .header-title { color: var(--primary); font-size: 18px; font-weight: 800; text-transform: uppercase; }

        .app { max-width: 900px; margin: 0 auto; padding: 15px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        
        .section-title { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; }

        /* Form */
        label { display: block; font-size: 10px; color: #7f8c8d; font-weight: 700; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }

        /* Tabella Dinamica */
        .row-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; position: relative; }
        
        .input-row { display: grid; grid-template-columns: 1fr 70px 70px; gap: 8px; }
        .desc-container { position: relative; display: flex; align-items: center; }
        .btn-voice { position: absolute; right: 8px; color: var(--primary); border: none; background: none; font-size: 18px; cursor: pointer; padding: 5px; }
        
        .u-m-select { font-weight: bold; background: #f8f9fa; }

        .btn-add { width: 100%; padding: 12px; background: none; border: 2px dashed var(--primary); color: var(--primary); border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-delete { position: absolute; top: -5px; right: -5px; background: #ff7675; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }

        /* Footer */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); padding: 15px 25px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .total-val { font-size: 22px; font-weight: 800; color: var(--primary); }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="#4a90e2"/>
            <path d="M50 25 L25 50 L25 75 L75 75 L75 50 Z" fill="white"/>
            <path d="M25 75 Q50 60 75 75 Z" fill="#4a90e2"/>
        </svg>
    </div>
    <div class="header-title">Edilcrema ERP</div>
</div>

<div class="app">
    <div class="card">
        <div class="section-title">Testata Richiesta</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Data Consegna</label>
                <input type="date" id="data_consegna">
            </div>
            <div>
                <label>Cantiere</label>
                <select id="cantiere">
                    <option value="Sede">Sede</option>
                    <option value="Cantiere 1">Cantiere 1</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Dettaglio Materiali</div>
        <div id="materiali-container">
            </div>
        <button class="btn-add" onclick="addRow()"><i class="fas fa-plus"></i> AGGIUNGI ARTICOLO</button>
    </div>
</div>

<div class="footer">
    <div class="total-display"><span class="total-val" id="grand-total">€ 0,00</span></div>
    <button class="btn-submit" onclick="salvaTutto()">REGISTRA</button>
</div>

<script>
const SCRIPT_URL = "IL_TUO_URL";

function addRow() {
    const id = Date.now();
    const container = document.getElementById('materiali-container');
    const div = document.createElement('div');
    div.className = 'row-container';
    div.id = `row-${id}`;
    
    div.innerHTML = `
        <button class="btn-delete" onclick="document.getElementById('row-${id}').remove(); updateCalc()">×</button>
        <div class="desc-container">
            <input type="text" class="m-mat" placeholder="Descrizione materiale...">
            <button class="btn-voice" onclick="startVoice(this)"><i class="fas fa-microphone"></i></button>
        </div>
        <div class="input-row">
            <select class="m-um u-m-select">
                <option value="NR">NR</option>
                <option value="M">M</option>
                <option value="ML">ML</option>
                <option value="MQ">MQ</option>
                <option value="MC">MC</option>
                <option value="KG">KG</option>
                <option value="T">T</option>
            </select>
            <input type="number" class="m-qty" placeholder="Qtà" oninput="updateCalc()">
            <input type="number" class="m-price" placeholder="€" oninput="updateCalc()">
        </div>
    `;
    container.appendChild(div);
}

// Funzione Vocale
function startVoice(btn) {
    const input = btn.previousElementSibling;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Il tuo browser non supporta il riconoscimento vocale.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    
    btn.style.color = 'red';
    recognition.start();

    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        btn.style.color = 'var(--primary)';
    };

    recognition.onerror = () => {
        btn.style.color = 'var(--primary)';
        alert("Errore nella registrazione vocale.");
    };

    recognition.onspeechend = () => {
        recognition.stop();
        btn.style.color = 'var(--primary)';
    };
}

function updateCalc() {
    let total = 0;
    document.querySelectorAll('.row-container').forEach(row => {
        const q = row.querySelector('.m-qty').value || 0;
        const p = row.querySelector('.m-price').value || 0;
        total += (q * p);
    });
    document.getElementById('grand-total').textContent = new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(total);
}

async function salvaTutto() {
    const ts = new Date().toLocaleString('it-IT');
    const dataC = document.getElementById('data_consegna').value;
    const rows = document.querySelectorAll('.row-container');

    for(let r of rows) {
        const data = {
            tipo: 'salva',
            timestamp: ts,
            consegna_entro: dataC,
            cantiere: document.getElementById('cantiere').value,
            materiale: r.querySelector('.m-mat').value,
            um: r.querySelector('.m-um').value,
            qta: r.querySelector('.m-qty').value,
            prezzo: r.querySelector('.m-price').value
        };
        // Logica fetch...
        console.log("Invio:", data);
    }
    alert("Inviato!");
}

window.onload = addRow;
</script>
</body>
</html>
