<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDILCREMA ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #4a90e2; 
            --bg: #f4f7f9; 
            --border: #dbe2e8; 
            --text: #2c3e50; 
            --text-light: #7f8c8d; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; }

        /* --- Header con il tuo Logo --- */
        .header { 
            background: var(--white); padding: 12px 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-bottom: 3px solid var(--primary);
        }
        
        /* Riproduzione SVG del logo caricato */
        .logo-container { width: 44px; height: 44px; flex-shrink: 0; }
        .logo-svg { width: 100%; height: 100%; }

        .header-title { color: var(--primary); font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .header-sub { color: var(--text-light); font-size: 11px; font-weight: 600; }

        .app { max-width: 900px; margin: 0 auto; padding: 15px; }

        /* --- Cards --- */
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .section-title { 
            font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 15px; 
            text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }

        /* --- Input --- */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--text-light); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; 
            font-size: 15px; transition: border 0.2s; -webkit-appearance: none;
        }
        input:focus { border-color: var(--primary); outline: none; }
        input[type="date"] { color: var(--primary); font-weight: 600; }

        /* --- Tabella Articoli --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { text-align: left; font-size: 10px; color: var(--text-light); padding: 10px 5px; border-bottom: 1px solid var(--bg); }
        td { padding: 8px 5px; }
        
        .btn-remove { color: #ccc; border: none; background: none; font-size: 20px; cursor: pointer; }
        .btn-add { 
            width: 100%; padding: 12px; margin-top: 10px; background: none; 
            border: 2px dashed var(--primary); color: var(--primary); 
            border-radius: 8px; font-weight: 700; cursor: pointer;
        }

        /* --- Footer --- */
        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); 
            padding: 15px 25px; border-top: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .total-display { line-height: 1.2; }
        .total-val { display: block; font-size: 24px; font-weight: 800; color: var(--primary); }
        
        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 15px 35px; 
            border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .loading-overlay { position: fixed; inset: 0; background: var(--white); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 35px; height: 35px; border: 3px solid #eee; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner"></div><p style="font-size:12px; color:var(--text-light)">Inizializzazione...</p></div>

<div class="header">
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="#4a90e2"/>
            <path d="M50 25 L25 50 L25 75 L75 75 L75 50 Z" fill="white"/>
            <path d="M25 75 Q50 60 75 75 Z" fill="#4a90e2"/>
        </svg>
    </div>
    <div class="header-text">
        <div class="header-title">Edilcrema ERP</div>
        <div class="header-sub">Richiesta Approvvigionamenti</div>
    </div>
</div>

<div class="app">
    <div class="card">
        <div class="section-title"><i class="fas fa-clock"></i> Tempistiche e Luogo</div>
        <div class="input-group">
            <label>Consegna entro il:</label>
            <input type="date" id="data_consegna">
        </div>
        <div class="input-group">
            <label>Cantiere di destinazione</label>
            <select id="cantiere">
                <option value="">Scegli...</option>
                <option value="Sede Crema">Sede Crema</option>
                <option value="Cantiere Milano">Cantiere Milano</option>
                <option value="Cantiere Lodi">Cantiere Lodi</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-shopping-cart"></i> Materiali</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Descrizione</th>
                        <th style="width: 70px;">Qtà</th>
                        <th style="width: 90px;">Stima €</th>
                        <th style="width: 30px;"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="btn-add" onclick="addRow()"><i class="fas fa-plus"></i> AGGIUNGI RIGA</button>
    </div>
</div>

<div class="footer">
    <div class="total-display">
        <span style="font-size: 10px; color: var(--text-light); text-transform: uppercase;">Totale Stimato</span>
        <span class="total-val" id="grand-total">€ 0,00</span>
    </div>
    <button class="btn-submit" id="btn-salva" onclick="salvaTutto()">REGISTRA</button>
</div>

<script>
const SCRIPT_URL = "IL_TUO_URL_DI_GOOGLE_SHEETS";

function addRow(){
    const tr = document.createElement('tr');
    tr.id = 'row-' + Date.now();
    tr.innerHTML = `
        <td><input type="text" class="m-mat" placeholder="es. Ferro 10mm"></td>
        <td><input type="number" class="m-qty" value="1" oninput="updateTotal()"></td>
        <td><input type="number" class="m-price" placeholder="0.00" oninput="updateTotal()"></td>
        <td><button class="btn-remove" onclick="document.getElementById('${tr.id}').remove(); updateTotal()">×</button></td>
    `;
    document.getElementById('tableBody').appendChild(tr);
}

function updateTotal(){
    let total = 0;
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const q = row.querySelector('.m-qty').value || 0;
        const p = row.querySelector('.m-price').value || 0;
        total += (q * p);
    });
    document.getElementById('grand-total').textContent = new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(total);
}

async function salvaTutto(){
    const btn = document.getElementById('btn-salva');
    const dataConsegna = document.getElementById('data_consegna').value;
    const cantiere = document.getElementById('cantiere').value;
    
    // Timestamp generato al momento del click
    const timestamp = new Date().toLocaleString('it-IT');

    if(!dataConsegna || !cantiere) return alert("Inserisci data e cantiere!");
    
    btn.disabled = true;
    btn.textContent = "INVIO...";

    try {
        const righe = document.querySelectorAll('#tableBody tr');
        for(let r of righe){
            const data = {
                tipo: 'salva',
                registro_ora: timestamp, // Data automatica
                scadenza_consegna: dataConsegna, // Data inserita
                cantiere: cantiere,
                materiale: r.querySelector('.m-mat').value,
                qta: r.querySelector('.m-qty').value,
                prezzo: r.querySelector('.m-price').value
            };
            await fetch(SCRIPT_URL + '?' + new URLSearchParams(data));
        }
        alert("Richiesta registrata correttamente!");
        location.reload();
    } catch(e) {
        alert("Errore durante l'invio.");
        btn.disabled = false;
        btn.textContent = "REGISTRA";
    }
}

window.onload = () => {
    addRow();
    setTimeout(() => document.getElementById('loader').style.display='none', 500);
};
</script>
</body>
</html>
