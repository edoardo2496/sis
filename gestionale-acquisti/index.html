<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Edilcrema — Gestionale Acquisti Multi-Articolo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#2196c4;padding:12px 20px;display:flex;align-items:center;gap:12px}
.header img{height:44px;width:44px;border-radius:8px;object-fit:cover}
.header-text{display:flex;flex-direction:column}
.header-title{color:#fff;font-size:17px;font-weight:600;line-height:1.2}
.header-sub{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}
.app{max-width:520px;margin:0 auto;padding:1rem}
.tab-bar{display:flex;gap:8px;margin-bottom:1.5rem}
.tab{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#666;cursor:pointer;font-family:inherit}
.tab.active{background:#2196c4;color:#fff;border-color:#2196c4;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
label{font-size:13px;color:#666;display:block;margin-bottom:6px;margin-top:14px}
label:first-child{margin-top:0}
select,input,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;font-family:inherit}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* STILI RIGHE ARTICOLI */
.item-row{background:#fcfcfc;border:1px solid #eee;border-radius:8px;padding:12px;margin-bottom:12px;position:relative; border-left: 4px solid #2196c4;}
.btn-remove{position:absolute;top:5px;right:5px;background:#ff4444;color:white;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;font-weight:bold}
.btn-add{background:#fff;color:#2196c4;border:1px dashed #2196c4;width:100%;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:15px;font-weight:600}
.btn-add:hover{background:#e3f2fd}
.total-box{background:#e3f2fd;border:1px solid #2196c4;text-align:right;padding:12px;border-radius:8px;margin-top:10px;margin-bottom:20px}
.total-box span{font-weight:700;color:#2196c4;font-size:18px}

.btn-primary{background:#2196c4;color:#fff;border:none;width:100%;padding:15px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-primary:disabled{background:#ccc}

.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem}
.metric-value{font-size:20px;font-weight:600}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:0.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}

@media(prefers-color-scheme:dark){
    body{background:#111;color:#eee}
    .card,.metric,.item-row{background:#1e1e1e;border-color:#333}
    select,input,textarea{background:#222;color:#eee;border-color:#444}
    .total-box{background:#172a3a}
    .btn-add{background:#1e1e1e}
}
</style>
</head>
<body>

<div class="header">
  <img src="https://via.placeholder.com/44x44/2196c4/ffffff?text=E" alt="Edilcrema">
  <div class="header-text">
    <div class="header-title">Edilcrema snc</div>
    <div class="header-sub">Nuovo Sistema Ordini Multipli</div>
  </div>
</div>

<div class="app">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('ordine')">Nuovo ordine</button>
    <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
  </div>

  <div id="tab-ordine" class="section active">
    <div class="card">
      <label>Data ordine</label>
      <input type="date" id="data_ordine">
      
      <label>Fornitore</label>
      <input type="text" id="fornitore" list="lista_fornitori" placeholder="Cerca fornitore...">
      <datalist id="lista_fornitori"></datalist>
      
      <label>Cantiere</label>
      <select id="cantiere"><option value="">— seleziona cantiere —</option></select>
      
      <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
      <div style="font-weight:600; margin-bottom:10px; font-size:14px; color:#2196c4">ARTICOLI NEL DOCUMENTO</div>
      
      <div id="items-list">
          </div>
      
      <button class="btn-add" onclick="aggiungiRiga()">+ Aggiungi un altro materiale</button>

      <div class="total-box">
        TOTALE ORDINE: <span id="gran_totale">€ 0,00</span>
      </div>

      <label>Stato</label>
      <select id="stato">
        <option>Inviato</option>
        <option>Confermato</option>
        <option>Ricevuto</option>
        <option>Fatturato</option>
        <option>Preventivo</option>
      </select>
      
      <label>Note generali</label>
      <textarea id="note" placeholder="Note facoltative..."></textarea>
      
      <button class="btn-primary" onclick="salvaTutto()" id="btn-salva">Salva nel Foglio Google</button>
    </div>
  </div>

  <div id="tab-dashboard" class="section">
    <div id="dash-loading" style="text-align:center;padding:2rem;color:#888">Caricamento dati...</div>
    <div id="dash-content" style="display:none">
        <div class="metric-grid">
            <div class="metric">
                <div style="font-size:12px;color:#888">Spesa Totale</div>
                <div class="metric-value" id="tot-ordini">€ 0</div>
            </div>
            <div class="metric">
                <div style="font-size:12px;color:#888">Righe elaborate</div>
                <div class="metric-value" id="count-ordini">0</div>
            </div>
        </div>
        <div class="card" id="bar-cantieri">
            </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// CONFIGURAZIONE
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFhCpTMnUJ1gLpV2GSSCIJVCtznzPy1bL1fRTe1tLGOxF1D7jhlV45KBAC-XN-nJM/exec";
let rigaCounter = 0;

// Formattazione Euro
function fmt(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n);}

// Aggiunge una riga materiale vuota
function aggiungiRiga() {
    const container = document.getElementById('items-list');
    const id = rigaCounter++;
    const html = `
        <div class="item-row" id="row-${id}">
            <button class="btn-remove" onclick="rimuoviRiga(${id})">×</button>
            <label>Descrizione Materiale</label>
            <input type="text" class="i-mat" placeholder="es. Sabbia, Cemento...">
            <div class="row">
                <div>
                    <label>Quantità</label>
                    <input type="number" class="i-qta" oninput="calc()" placeholder="0" step="any">
                </div>
                <div>
                    <label>Unità</label>
                    <select class="i-uni">
                        <option>pz</option><option>kg</option><option>mc</option><option>mq</option><option>t</option><option>ml</option>
                    </select>
                </div>
            </div>
            <label>Prezzo Unitario (€)</label>
            <input type="number" class="i-pre" oninput="calc()" placeholder="0.00" step="0.01">
        </div>`;
    container.insertAdjacentHTML('beforeend', html);
}

// Rimuove una riga
function rimuoviRiga(id) {
    const rows = document.querySelectorAll('.item-row');
    if(rows.length > 1) {
        document.getElementById(`row-${id}`).remove();
        calc();
    } else {
        alert("Deve esserci almeno un materiale per ordine.");
    }
}

// Calcola il totale complessivo di tutte le righe
function calc() {
    let tot = 0;
    document.querySelectorAll('.item-row').forEach(r => {
        const q = parseFloat(r.querySelector('.i-qta').value) || 0;
        const p = parseFloat(r.querySelector('.i-pre').value) || 0;
        tot += (q * p);
    });
    document.getElementById('gran_totale').textContent = fmt(tot);
}

// Invia i dati a Google Apps Script
async function salvaTutto() {
    const btn = document.getElementById('btn-salva');
    const articoli = [];
    
    // Raccogliamo i dati di ogni riga
    document.querySelectorAll('.item-row').forEach(r => {
        const mat = r.querySelector('.i-mat').value.trim();
        const qta = r.querySelector('.i-qta').value;
        const pre = r.querySelector('.i-pre').value;
        if(mat && qta) {
            articoli.push({
                materiale: mat,
                quantita: qta,
                unita: r.querySelector('.i-uni').value,
                prezzo: pre
            });
        }
    });

    // Validazione base
    const dataOrd = document.getElementById('data_ordine').value;
    const forn = document.getElementById('fornitore').value;
    const cant = document.getElementById('cantiere').value;

    if(!dataOrd || !forn || !cant || articoli.length === 0) {
        alert("Assicurati di aver inserito Data, Fornitore, Cantiere e almeno un Materiale valido.");
        return;
    }

    const params = {
        tipo: 'salva',
        data_ordine: dataOrd,
        fornitore: forn,
        cantiere: cant,
        stato: document.getElementById('stato').value,
        note: document.getElementById('note').value,
        articoli: JSON.stringify(articoli) // Inviamo l'array come testo JSON
    };

    btn.disabled = true;
    btn.textContent = "Invio in corso...";

    try {
        // Usiamo mode: 'no-cors' per evitare blocchi cross-origin
        await fetch(SCRIPT_URL + '?' + new URLSearchParams(params), { mode: 'no-cors' });
        
        // Mostra successo
        const t = document.getElementById('toast');
        t.textContent = "Ordine inviato con successo!";
        t.classList.add('show');
        
        setTimeout(() => {
            location.reload(); // Ricarica per pulire tutto
        }, 1500);

    } catch(e) {
        alert("Errore durante il salvataggio: " + e.message);
        btn.disabled = false;
        btn.textContent = "Salva nel Foglio Google";
    }
}

// Inizializzazione dati
async function init() {
    document.getElementById('data_ordine').value = new Date().toISOString().split('T')[0];
    aggiungiRiga(); // Parte con una riga vuota
    
    try {
        const resF = await fetch(SCRIPT_URL + "?tipo=fornitori");
        const fornitori = await resF.json();
        document.getElementById('lista_fornitori').innerHTML = fornitori.map(f => `<option value="${f}">`).join('');
        
        const resC = await fetch(SCRIPT_URL + "?tipo=cantieri");
        const cantieri = await resC.json();
        document.getElementById('cantiere').innerHTML += cantieri.map(c => `<option value="${c}">${c}</option>`).join('');
    } catch(e) {
        console.error("Errore caricamento liste:", e);
    }
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['ordine', 'dashboard'][i] === name));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'dashboard') caricaDashboard();
}

async function caricaDashboard() {
    try {
        const res = await fetch(SCRIPT_URL + "?tipo=ordini");
        const ordini = await res.json();
        const tot = ordini.reduce((acc, o) => acc + o.totale, 0);
        document.getElementById('tot-ordini').textContent = fmt(tot);
        document.getElementById('count-ordini').textContent = ordini.length;
        document.getElementById('dash-loading').style.display = 'none';
        document.getElementById('dash-content').style.display = 'block';
    } catch(e) {
        document.getElementById('dash-loading').textContent = "Errore caricamento dashboard.";
    }
}

init();
</script>

</body>
</html>
