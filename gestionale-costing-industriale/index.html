<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edilcrema ERP | Precision Costing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --dark: #1f2937; --bg: #f3f4f6; --success: #10b981; --border: #d1d5db; --text: #374151; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .section-title { font-size: 0.85rem; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--bg); padding-bottom: 8px; }
        
        .grid-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.9rem; }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; font-size: 0.7rem; color: #6b7280; padding: 10px; text-transform: uppercase; }
        td { padding: 5px; vertical-align: middle; }
        
        /* Input specifici per riga */
        .m-price { font-family: monospace; font-weight: 600; }
        .row-total { font-weight: bold; color: var(--primary); font-family: monospace; }
        
        .btn-add { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 700; margin-top: 15px; transition: 0.2s; }
        .btn-add:hover { background: var(--primary); color: white; }
        .btn-remove { color: #ef4444; cursor: pointer; text-align: center; }
        
        .footer-summary { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid var(--border); }
        .grand-total { font-size: 1.5rem; font-weight: 800; color: var(--dark); font-family: monospace; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner"></div><p>Sincronizzazione Parametri...</p></div>

<div class="header">
    <h1>EDILCREMA <span style="font-weight:300">ERP</span></h1>
    <span><i class="fas fa-check-double"></i> Industrial Costing Mode</span>
</div>

<div class="container">
    <form id="erpForm">
        <div class="card">
            <div class="section-title"><i class="fas fa-industry"></i> Intestazione Commessa</div>
            <div class="grid-header">
                <div>
                    <label>Data Ordine</label>
                    <input type="date" id="data" required>
                </div>
                <div>
                    <label>Cantiere</label>
                    <select id="cantiere" required><option value="">Caricamento...</option></select>
                </div>
                <div>
                    <label>Fornitore Principale</label>
                    <input type="text" id="fornitore" list="fornitore_list" placeholder="Ragione Sociale..." required>
                    <datalist id="fornitore_list"></datalist>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-table"></i> Dettaglio Voci di Costo</div>
            <div class="table-responsive">
                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Macro</th>
                            <th style="width: 20%;">Micro / Materiale</th>
                            <th style="width: 8%;">Qtà</th>
                            <th style="width: 8%;">Unità</th>
                            <th style="width: 12%;">Prezzo Unit. (€)</th>
                            <th style="width: 22%;">Note Voce</th>
                            <th style="width: 10%;">Totale</th>
                            <th style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button type="button" class="btn-add" onclick="addRow()">
                <i class="fas fa-plus-circle"></i> AGGIUNGI RIGA AL DOCUMENTO
            </button>
        </div>

        <div class="footer-summary">
            <span style="font-weight:700; color:#6b7280">TOTALE COMPLESSIVO:</span>
            <span class="grand-total" id="grandTotalDisplay">€ 0.00000</span>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">REGISTRA MOVIMENTI</button>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:700"></div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgzPBU7EVwxZRfVt-Mhsth44NfIl2Dqi_iGSrQTT91poAjvdn_B7x420Tl1Y5LGLVX7A/exec";
    let DATA_STORE = { cantieri: [], fornitori: [], mappatura: {} };

    window.onload = async () => {
        document.getElementById('data').valueAsDate = new Date();
        try {
            const response = await fetch(SCRIPT_URL);
            DATA_STORE = await response.json();
            
            const cSel = document.getElementById('cantiere');
            cSel.innerHTML = '<option value="">— Seleziona Cantiere —</option>';
            DATA_STORE.cantieri.forEach(c => cSel.add(new Option(c, c)));
            document.getElementById('fornitore_list').innerHTML = DATA_STORE.fornitori.map(f => `<option value="${f}">`).join('');
            
            addRow(); 
            document.getElementById('loader').style.display = 'none';
        } catch (e) { alert("Errore di connessione. Controlla lo script URL."); }
    };

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const rowId = Date.now();
        const tr = document.createElement('tr');
        tr.id = `row-${rowId}`;
        
        let macroOpts = '<option value="">—</option>';
        Object.keys(DATA_STORE.mappatura).sort().forEach(m => macroOpts += `<option value="${m}">${m}</option>`);

        tr.innerHTML = `
            <td><select class="m-macro" onchange="updateMicroOptions('${rowId}')" required>${macroOpts}</select></td>
            <td><input type="text" class="m-micro" list="list-${rowId}" required><datalist id="list-${rowId}"></datalist></td>
            <td><input type="number" class="m-qty" step="0.00001" value="1.00000" oninput="calculateRow('${rowId}')"></td>
            <td><select class="m-unit"><option>nr</option><option>m</option><option>ml</option><option>mq</option><option>mc</option><option>kg</option><option>q</option><option>t</option><option>ore</option><option>corpo</option></select></td>
            <td><input type="number" class="m-price" step="0.00001" placeholder="0.00000" oninput="calculateRow('${rowId}')" required></td>
            <td><input type="text" class="m-note-row" placeholder="Note specifiche riga..."></td>
            <td><span class="row-total" id="total-${rowId}">0.00000</span></td>
            <td><i class="fas fa-times-circle btn-remove" onclick="removeRow('${rowId}')"></i></td>
        `;
        tbody.appendChild(tr);
    }

    function removeRow(id) {
        if (document.querySelectorAll('#tableBody tr').length > 1) {
            document.getElementById(`row-${id}`).remove();
            updateGrandTotal();
        }
    }

    function updateMicroOptions(id) {
        const macro = document.querySelector(`#row-${id} .m-macro`).value;
        const datalist = document.getElementById(`list-${id}`);
        datalist.innerHTML = (DATA_STORE.mappatura[macro] || []).map(m => `<option value="${m}">`).join('');
    }

    function calculateRow(id) {
        const q = parseFloat(document.querySelector(`#row-${id} .m-qty`).value) || 0;
        const p = parseFloat(document.querySelector(`#row-${id} .m-price`).value) || 0;
        const total = (q * p).toFixed(5);
        document.getElementById(`total-${id}`).innerText = total;
        updateGrandTotal();
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            const q = parseFloat(tr.querySelector('.m-qty').value) || 0;
            const p = parseFloat(tr.querySelector('.m-price').value) || 0;
            total += (q * p);
        });
        document.getElementById('grandTotalDisplay').innerText = '€ ' + total.toFixed(5);
    }

    document.getElementById('erpForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        const status = document.getElementById('status');
        
        const headerData = {
            data: document.getElementById('data').value,
            cantiere: document.getElementById('cantiere').value,
            fornitore: document.getElementById('fornitore').value
        };

        const rows = document.querySelectorAll('#tableBody tr');
        status.innerHTML = `<i class="fas fa-sync fa-spin"></i> Registrazione di ${rows.length} movimenti...`;

        for (let tr of rows) {
            const payload = {
                ...headerData,
                macro: tr.querySelector('.m-macro').value,
                micro: tr.querySelector('.m-micro').value,
                qty: tr.querySelector('.m-qty').value,
                unit: tr.querySelector('.m-unit').value,
                price: tr.querySelector('.m-price').value,
                total: (parseFloat(tr.querySelector('.m-qty').value) * parseFloat(tr.querySelector('.m-price').value)).toFixed(5),
                note: tr.querySelector('.m-note-row').value // Nota specifica per riga
            };
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch (err) {
                console.error("Errore riga:", err);
            }
        }

        status.innerHTML = "<span style='color:green'>✓ DATABASE AGGIORNATO CORRETTAMENTE!</span>";
        setTimeout(() => location.reload(), 1500);
    };
</script>
</body>
</html>
