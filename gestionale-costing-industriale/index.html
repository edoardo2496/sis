<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edilcrema ERP | Precision Costing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2196c4;
            --bg: #f5f5f0;
            --border: #e8e8e8;
            --text: #1a1a1a;
            --text-light: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; }

        .header {
            background: #2196c4;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header img {
            height: 44px;
            width: 44px;
            border-radius: 8px;
            object-fit: cover;
        }
        .header-text { display: flex; flex-direction: column; }
        .header-title { color: #fff; font-size: 17px; font-weight: 600; line-height: 1.2; }
        .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 2px; }

        .app { max-width: 700px; margin: 0 auto; padding: 1rem; }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 0.5px solid var(--border);
            padding-bottom: 10px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 6px;
            margin-top: 14px;
        }
        label:first-child { margin-top: 0; }

        select, input[type=text], input[type=date], input[type=number] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            -webkit-appearance: none;
        }
        select:focus, input:focus { outline: none; border-color: var(--primary); }

        .grid-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 11px;
            color: var(--text-light);
            padding: 8px 5px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 0.5px solid var(--border);
        }
        td { padding: 5px; }

        .btn-add {
            background: #fff;
            color: var(--primary);
            border: 1.5px dashed var(--primary);
            padding: 11px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            margin-top: 10px;
            font-family: inherit;
            transition: background .15s;
        }
        .btn-add:hover { background: #f0f8fd; }

        .btn-remove { color: #ccc; cursor: pointer; transition: color .15s; }
        .btn-remove:hover { color: #e24b4a; }

        .footer-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: white;
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
        }
        .footer-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; margin-bottom: 2px; }
        .grand-total { font-size: 22px; font-weight: 600; color: var(--primary); }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 13px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: opacity .15s;
        }
        .btn-submit:active { opacity: .8; }
        .btn-submit:disabled { opacity: .5; }

        #statusMsg { text-align: center; padding: 10px; font-size: 14px; font-weight: 500; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 500px) {
            .grid-header { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <div class="header-text">
        <div class="header-title">Edilcrema ERP</div>
        <div class="header-sub">Precision Costing System</div>
    </div>
</div>

<div class="app">
    <form id="erpForm">

        <div class="card">
            <div class="section-title"><i class="fas fa-industry"></i> Intestazione commessa</div>
            <div class="grid-header">
                <div>
                    <label>Data ordine</label>
                    <input type="date" id="data" required>
                </div>
                <div>
                    <label>Cantiere di riferimento</label>
                    <select id="cantiere" required><option value="">— Seleziona cantiere —</option></select>
                </div>
                <div>
                    <label>Stato documento</label>
                    <select id="docStatus">
                        <option value="Inserito">Inserito</option>
                        <option value="Preventivo">Preventivo</option>
                        <option value="Fatturato">Fatturato</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-list"></i> Voci di costo</div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:20%">Fornitore</th>
                            <th style="width:15%">Macro</th>
                            <th style="width:20%">Micro / Materiale</th>
                            <th style="width:8%">Unità</th>
                            <th style="width:8%">Qtà</th>
                            <th style="width:10%">Prezzo</th>
                            <th style="width:15%">Note / DDT</th>
                            <th style="width:4%"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button type="button" class="btn-add" onclick="addRow()">
                <i class="fas fa-plus" style="font-size:12px; margin-right:6px;"></i> Aggiungi voce
            </button>
        </div>

        <div id="statusMsg"></div>

        <div class="footer-summary">
            <div>
                <div class="footer-label">Totale imponibile</div>
                <div class="grand-total" id="grandTotal">€ 0,00</div>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Registra acquisto</button>
        </div>

    </form>
</div>

<datalist id="fornitore_list"></datalist>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgzPBU7EVwxZRfVt-Mhsth44NfIl2Dqi_iGSrQTT91poAjvdn_B7x420Tl1Y5LGLVX7A/exec";
    let DATA_STORE = { cantieri: [], fornitori: [], mappatura: {} };

    window.onload = async () => {
        document.getElementById('data').valueAsDate = new Date();
        try {
            const res = await fetch(SCRIPT_URL);
            DATA_STORE = await res.json();
            const cSel = document.getElementById('cantiere');
            DATA_STORE.cantieri.forEach(c => cSel.add(new Option(c, c)));
            document.getElementById('fornitore_list').innerHTML = DATA_STORE.fornitori.map(f => `<option value="${f}">`).join('');
            addRow();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { alert("Errore caricamento dati!"); }
    };

    function addRow() {
        const id = Date.now();
        const tr = document.createElement('tr');
        tr.id = `row-${id}`;
        let macroOpts = '<option value="">— Macro —</option>';
        Object.keys(DATA_STORE.mappatura).sort().forEach(m => macroOpts += `<option value="${m}">${m}</option>`);

        tr.innerHTML = `
            <td><input type="text" class="m-fornitore" list="fornitore_list" placeholder="Fornitore..." required></td>
            <td><select class="m-macro" onchange="updateMicro('${id}')" required>${macroOpts}</select></td>
            <td><input type="text" class="m-micro" list="list-${id}" placeholder="Materiale..." required><datalist id="list-${id}"></datalist></td>
            <td><select class="m-unit"><option value="NR">NR</option><option value="MC">MC</option><option value="KG">KG</option><option value="ML">ML</option><option value="ORE">ORE</option></select></td>
            <td><input type="number" class="m-qty" step="0.01" value="1.00" oninput="calc()"></td>
            <td><input type="number" class="m-price" step="0.01" placeholder="0.00" oninput="calc()" required></td>
            <td><input type="text" class="m-note" placeholder="es. DDT 123..."></td>
            <td><i class="fas fa-trash btn-remove" onclick="document.getElementById('row-${id}').remove();calc()"></i></td>
        `;
        document.getElementById('tableBody').appendChild(tr);
    }

    function updateMicro(id) {
        const macro = document.querySelector(`#row-${id} .m-macro`).value;
        document.getElementById(`list-${id}`).innerHTML = (DATA_STORE.mappatura[macro] || []).map(m => `<option value="${m}">`).join('');
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            total += (parseFloat(tr.querySelector('.m-qty').value) || 0) * (parseFloat(tr.querySelector('.m-price').value) || 0);
        });
        document.getElementById('grandTotal').innerText = '€ ' + total.toLocaleString('it-IT', {minimumFractionDigits: 2});
    }

    document.getElementById('erpForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');
        btn.disabled = true;
        msg.style.color = '#888';
        msg.innerHTML = "Invio in corso...";

        try {
            const rows = document.querySelectorAll('#tableBody tr');
            for (let tr of rows) {
                const payload = {
                    data: document.getElementById('data').value,
                    cantiere: document.getElementById('cantiere').value,
                    status: document.getElementById('docStatus').value,
                    fornitore: tr.querySelector('.m-fornitore').value,
                    macro: tr.querySelector('.m-macro').value,
                    micro: tr.querySelector('.m-micro').value,
                    unit: tr.querySelector('.m-unit').value,
                    qty: tr.querySelector('.m-qty').value,
                    price: tr.querySelector('.m-price').value,
                    note: tr.querySelector('.m-note').value,
                    total: (parseFloat(tr.querySelector('.m-qty').value) * parseFloat(tr.querySelector('.m-price').value)).toFixed(2)
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            }
            msg.style.color = "#10b981";
            msg.innerHTML = "✓ Registrato con successo!";
            setTimeout(() => location.reload(), 1500);
        } catch (err) {
            msg.style.color = "#e24b4a";
            msg.innerHTML = "Errore durante l'invio.";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
