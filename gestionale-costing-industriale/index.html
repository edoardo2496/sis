<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edilcrema ERP | Multi-Entry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --dark: #1f2937; --bg: #f3f4f6; --success: #10b981; --border: #d1d5db; --text: #374151; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .section-title { font-size: 0.85rem; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--bg); padding-bottom: 8px; }
        
        .grid-header { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.95rem; }

        /* Tabella Righe */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; color: #6b7280; padding: 10px; border-bottom: 2px solid var(--bg); }
        td { padding: 8px; vertical-align: top; }
        .row-total { font-weight: bold; color: var(--primary); padding-top: 15px; display: block; }
        
        .btn-add { background: #e8f0fe; color: var(--primary); border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.2s; }
        .btn-add:hover { background: var(--primary); color: white; }
        .btn-remove { color: #ef4444; cursor: pointer; padding-top: 15px; display: block; text-align: center; }
        
        .footer-summary { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--bg); }
        .grand-total { font-size: 1.4rem; font-weight: 800; color: var(--dark); }
        
        .btn-submit { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner"></div><p>Caricamento liste...</p></div>

<div class="header">
    <h1>EDILCREMA <span style="font-weight:300">ERP</span></h1>
    <span><i class="fas fa-circle" style="color:var(--success); font-size:10px"></i> LIVE</span>
</div>

<div class="container">
    <form id="erpForm">
        <div class="card">
            <div class="section-title"><i class="fas fa-file-invoice"></i> Intestazione Documento</div>
            <div class="grid-header">
                <div class="field">
                    <label>Data</label>
                    <input type="date" id="data" required>
                </div>
                <div class="field">
                    <label>Cantiere Target</label>
                    <select id="cantiere" required><option value="">Caricamento...</option></select>
                </div>
                <div class="field" style="grid-column: span 2;">
                    <label>Fornitore</label>
                    <input type="text" id="fornitore" list="fornitore_list" placeholder="Cerca fornitore..." required>
                    <datalist id="fornitore_list"></datalist>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-list"></i> Voci di Costo</div>
            <div class="table-responsive">
                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Macro</th>
                            <th style="width: 25%;">Micro / Materiale</th>
                            <th style="width: 10%;">Qtà</th>
                            <th style="width: 10%;">Unità</th>
                            <th style="width: 15%;">Prezzo Unit.</th>
                            <th style="width: 15%;">Totale</th>
                            <th style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
            <button type="button" class="btn-add" onclick="addRow()">
                <i class="fas fa-plus"></i> Aggiungi un'altra voce a questo ordine
            </button>
        </div>

        <div class="card">
            <div class="field">
                <label>Note Generali / Riferimento Documento</label>
                <textarea id="note" rows="2" placeholder="Es: Fattura 123/2024 - Consegna in loco"></textarea>
            </div>
            <div class="footer-summary">
                <span style="color:#6b7280; font-weight:600">TOTALE ORDINE:</span>
                <span class="grand-total" id="grandTotalDisplay">€ 0,00</span>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">REGISTRA TUTTE LE VOCI</button>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:700"></div>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgzPBU7EVwxZRfVt-Mhsth44NfIl2Dqi_iGSrQTT91poAjvdn_B7x420Tl1Y5LGLVX7A/exec";
    let DATA_STORE = { cantieri: [], fornitori: [], mappatura: {} };

    window.onload = async () => {
        document.getElementById('data').valueAsDate = new Date();
        try {
            const response = await fetch(SCRIPT_URL);
            DATA_STORE = await response.json();
            
            const cSel = document.getElementById('cantiere');
            cSel.innerHTML = '<option value="">— Scegli —</option>';
            DATA_STORE.cantieri.forEach(c => cSel.add(new Option(c, c)));
            document.getElementById('fornitore_list').innerHTML = DATA_STORE.fornitori.map(f => `<option value="${f}">`).join('');
            
            addRow(); // Aggiunge la prima riga vuota
            document.getElementById('loader').style.display = 'none';
        } catch (e) { alert("Errore connessione database."); }
    };

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const rowId = Date.now();
        const tr = document.createElement('tr');
        tr.id = `row-${rowId}`;
        
        let macroOptions = '<option value="">—</option>';
        Object.keys(DATA_STORE.mappatura).sort().forEach(m => macroOptions += `<option value="${m}">${m}</option>`);

        tr.innerHTML = `
            <td><select class="m-macro" onchange="updateMicroOptions('${rowId}')" required>${macroOptions}</select></td>
            <td><input type="text" class="m-micro" list="list-${rowId}" required><datalist id="list-${rowId}"></datalist></td>
            <td><input type="number" class="m-qty" step="0.01" value="1" oninput="calculateRow('${rowId}')"></td>
            <td><select class="m-unit"><option>nr</option><option>m</option><option>mq</option><option>mc</option><option>kg</option><option>ore</option><option>corpo</option></select></td>
            <td><input type="number" class="m-price" step="0.001" placeholder="0.00" oninput="calculateRow('${rowId}')"></td>
            <td><span class="row-total" id="total-${rowId}">€ 0,00</span></td>
            <td><i class="fas fa-trash btn-remove" onclick="removeRow('${rowId}')"></i></td>
        `;
        tbody.appendChild(tr);
    }

    function removeRow(id) {
        const row = document.getElementById(`row-${id}`);
        if (document.querySelectorAll('#tableBody tr').length > 1) {
            row.remove();
            updateGrandTotal();
        }
    }

    function updateMicroOptions(id) {
        const macro = document.querySelector(`#row-${id} .m-macro`).value;
        const datalist = document.getElementById(`list-${id}`);
        datalist.innerHTML = (DATA_STORE.mappatura[macro] || []).map(m => `<option value="${m}">`).join('');
    }

    function calculateRow(id) {
        const q = parseFloat(document.querySelector(`#row-${id} .m-qty`).value) || 0;
        const p = parseFloat(document.querySelector(`#row-${id} .m-price`).value) || 0;
        document.getElementById(`total-${id}`).innerText = (q * p).toLocaleString('it-IT', {style: 'currency', currency: 'EUR'});
        updateGrandTotal();
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            const q = parseFloat(tr.querySelector('.m-qty').value) || 0;
            const p = parseFloat(tr.querySelector('.m-price').value) || 0;
            total += (q * p);
        });
        document.getElementById('grandTotalDisplay').innerText = total.toLocaleString('it-IT', {style: 'currency', currency: 'EUR'});
    }

    document.getElementById('erpForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        const status = document.getElementById('status');
        
        const commonData = {
            data: document.getElementById('data').value,
            cantiere: document.getElementById('cantiere').value,
            fornitore: document.getElementById('fornitore').value,
            note: document.getElementById('note').value
        };

        const rows = document.querySelectorAll('#tableBody tr');
        status.innerHTML = `Invio di ${rows.length} voci in corso...`;

        for (let tr of rows) {
            const payload = {
                ...commonData,
                macro: tr.querySelector('.m-macro').value,
                micro: tr.querySelector('.m-micro').value,
                qty: tr.querySelector('.m-qty').value,
                unit: tr.querySelector('.m-unit').value,
                price: tr.querySelector('.m-price').value,
                total: (parseFloat(tr.querySelector('.m-qty').value) * parseFloat(tr.querySelector('.m-price').value)).toFixed(2)
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        }

        status.innerHTML = "<span style='color:green'>✓ Tutte le voci sono state registrate!</span>";
        setTimeout(() => location.reload(), 2000);
    };
</script>
</body>
</html>
