<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edilcrema — Ore Cantiere</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #eef3f7;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #4f8fd8, #2d6fb5);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
    }

    .header img {
      height: 42px;
      border-radius: 6px;
      background: white;
      padding: 4px;
    }

    .header span {
      font-size: 18px;
      font-weight: 600;
    }

    /* CONTENITORE */
    .container {
      max-width: 520px;
      margin: 30px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #2d3a4b;
    }

    /* TAB */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #e4ecf5;
      font-weight: 600;
      cursor: pointer;
      color: #2d3a4b;
    }

    .tabs .active {
      background: #2d6fb5;
      color: white;
    }

    /* CARD */
    .card {
      background: white;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 16px;
      font-size: 13px;
      color: #5b6775;
    }

    input, select, textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d0d7df;
      background: #f8fafc;
      font-size: 15px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2d6fb5;
      background: white;
    }

    textarea {
      resize: none;
    }

    /* BOTTONI ORE */
    .quick-hours {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .quick-hours button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #dbe7f5;
      cursor: pointer;
      font-weight: 600;
      color: #2d6fb5;
    }

    .quick-hours button:hover {
      background: #c7dbf2;
    }

    /* SUBMIT */
    .submit-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #2d6fb5;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #245a94;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo_edilcrema.jpg" alt="Edilcrema">
  <span>Gestione ore cantiere</span>
</div>

<div class="container">

  <h1>La costruisco subito:</h1>

  <div class="tabs">
    <button class="active">Registra ore</button>
    <button>Storico</button>
    <button>Cantieri</button>
  </div>

  <div class="card">

    <form method="POST" action="/salva_ore">

      <label>Cantiere</label>
      <select name="cantiere" required>
        <option value="">— scegli —</option>
        {% for c in cantieri %}
        <option value="{{ c['descrizione_cantiere'] }}">
          {{ c['descrizione_cantiere'] }}
        </option>
        {% endfor %}
      </select>

      <label>Data</label>
      <input type="date" name="data" required>

      <label>Ore lavorate</label>
      <input type="number" step="0.25" name="ore" placeholder="es. 8" required>

      <div class="quick-hours">
        <button type="button" onclick="setOre(8)">8h</button>
        <button type="button" onclick="setOre(4)">4h</button>
        <button type="button" onclick="setOre(2)">2h</button>
      </div>

      <label>Note (facoltativo)</label>
      <textarea name="note" rows="3" placeholder="es. getto fondazioni..."></textarea>

      <button type="submit" class="submit-btn">Salva</button>

    </form>

  </div>

</div>

<script>
  function setOre(val) {
    document.querySelector("input[name='ore']").value = val;
  }

  document.addEventListener("DOMContentLoaded", function () {
    const oggi = new Date().toISOString().split("T")[0];
    document.querySelector("input[name='data']").value = oggi;
  });
</script>

</body>
</html>
